name: Refresh static stock prices

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install price dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance twstock

      - name: Refresh static prices
        run: python modules/static_price_refresher.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- docs/data.json; then
            echo "No price changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "auto: refresh static stock prices"
          git push
